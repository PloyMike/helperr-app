<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #14B8A6 0%, #0D9488 100%);
      font-family: "Outfit", sans-serif;
    }
    .container {
      text-align: center;
      color: white;
    }
    h1 {
      font-size: 96px;
      font-weight: 800;
      margin: 0 0 20px 0;
      letter-spacing: -2px;
    }
    p {
      font-size: 36px;
      font-weight: 700;
      margin: 0;
      opacity: 0.9;
    }
    .icon {
      font-size: 120px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🤝</div>
    <h1>Helperr</h1>
    <p>Finde vertrauenswürdige Helfer in deiner Nähe</p>
  </div>
</body>
</html>
